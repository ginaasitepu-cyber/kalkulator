<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #b4ddff;
            flex-direction: column;
        }
        .calculator {
            background: #6a78f7;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgb(255, 0, 0);
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            height: 50px;
            text-align: right;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            background-color: #2ca5dd;
            padding: 15px;
            font-size: 1.2em;
            cursor: pointer;
        }
        .history {
            background: #6a78f7;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgb(255, 0, 0);
            width: 300px;
            text-align: center;
        }
        .history-list {
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2><marquee>Kalkulator Sederhana</marquee></h2>
    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendOperator('+')">+</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendOperator('-')">-</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendOperator('*')">*</button>
            <button onclick="appendOperator('/')">/</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculateResult()">=</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="calculatePercentage()">%</button>
            <button onclick="calculateSquareRoot()">√</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
        </div>
    </div>
    <div class="history">
        <h3>Riwayat</h3>
        <div class="history-list" id="history-list"></div>
        <button onclick="clearHistory()">Hapus Riwayat</button>
    </div>
    <script>
        let resetDisplay = false;

        function appendValue(value) {
            let display = document.getElementById('display');
            if (resetDisplay) {
                display.value = ''; 
                resetDisplay = false;
            }
            display.value += value;
        }

        function appendOperator(operator) {
            let display = document.getElementById('display');
            let lastChar = display.value.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                display.value = display.value.slice(0, -1) + operator;
            } else {
                display.value += operator;
            }
            resetDisplay = false;
        }

        function clearDisplay() {
            document.getElementById('display').value = '';
            resetDisplay = false;
        }

        function deleteLast() {
            let display = document.getElementById('display');
            display.value = display.value.slice(0, -1);
        }

        function calculateResult() {
            try {
                let display = document.getElementById('display');
                let expression = display.value;
                let result = Function('return ' + expression)();
                display.value = result;
                addToHistory(expression + ' = ' + result);
                resetDisplay = true;
            } catch (error) {
                alert('Input tidak valid');
            }
        }

        function calculatePercentage() {
            try {
                let display = document.getElementById('display');
                let result = eval(display.value) / 100;
                addToHistory(display.value + '% = ' + result);
                display.value = result;
                resetDisplay = true;
            } catch (error) {
                alert('Input tidak valid');
            }
        }

        function calculateSquareRoot() {
            try {
                let display = document.getElementById('display');
                let result = Math.sqrt(parseFloat(display.value));
                addToHistory('√' + display.value + ' = ' + result);
                display.value = result;
                resetDisplay = true;
            } catch (error) {
                alert('Input tidak valid');
            }
        }
        
        function calculateLog() {
            let display = document.getElementById('display');
            let result = Math.log10(parseFloat(display.value));
            addToHistory('log(' + display.value + ') = ' + result);
            display.value = result;
            resetDisplay = true;
        }

        function addToHistory(entry) {
            let historyList = document.getElementById('history-list');
            let newEntry = document.createElement('div');
            newEntry.textContent = entry;
            historyList.prepend(newEntry);
        }

        function clearHistory() {
            document.getElementById('history-list').innerHTML = '';
        }
    </script>
</body>
</html>
